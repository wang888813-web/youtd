<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Downloader</title>
  <style>
    body{text-align:center;padding:40px;font-family:Arial}
    input{width:80%;padding:12px;font-size:16px;margin:10px 0}
    button{padding:12px 30px;background:#000;color:#fff;border:none;border-radius:6px;cursor:pointer}
    #status{color:#666;margin:15px 0}
    #thumbnail{max-width:320px;margin:20px auto;border-radius:10px}
    .download-btn{background:#ff0000;color:#fff;margin:5px;padding:10px 25px}
  </style>
</head>
<body>
  <h1>YouTube Downloader</h1>
  <input id="videoUrl" placeholder="Paste YouTube URL">
  <button onclick="startParse()">Parse Video</button>

  <div id="status"></div>
  <img id="thumbnail" style="display:none">
  <div id="downloadArea"></div>

  <script>
    let progressUrl = "";
    let thumbnail = "";

    async function startParse() {
      const url = document.getElementById("videoUrl").value;
      if (!url) return alert("Enter URL");

      setStatus("Creating task...");
      document.getElementById("downloadArea").innerHTML = "";

      // 创建任务
      const res = await fetch(`/api/create-task?url=${encodeURIComponent(url)}`);
      const data = await res.json();

      if (!data.success) {
        setStatus("Parse failed ❌");
        return;
      }

      progressUrl = data.progress_url;
      thumbnail = data.thumbnail;
      document.getElementById("thumbnail").src = thumbnail;
      document.getElementById("thumbnail").style.display = "block";

      setStatus("Processing video... Please wait");
      startPolling();
    }

    // 自动轮询进度（前端轮询 = Vercel 永不超时）
    function startPolling() {
      const interval = setInterval(async () => {
        const res = await fetch(`/api/check-progress?url=${encodeURIComponent(progressUrl)}`);
        const data = await res.json();

        if (data.status === "finished") {
          clearInterval(interval);
          setStatus("Success ✅");
          showDownload(data.download_link);
        } else if (data.status === "error") {
          clearInterval(interval);
          setStatus("Failed ❌");
        }
      }, 2000);
    }

    function showDownload(link) {
      document.getElementById("downloadArea").innerHTML = `
        <button class="download-btn" onclick="window.open('${link}')">Download MP4</button>
      `;
    }

    function setStatus(text) {
      document.getElementById("status").innerText = text;
    }
  </script>
</body>
</html>
